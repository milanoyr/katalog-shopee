<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katalog Shopee - Landing</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* CSS manual <20% */
    .hero {
      background: linear-gradient(135deg, #ff5722, #ff9800);
      color: white;
      padding: 100px 20px;
      text-align: center;
    }
    .product-card img {
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <h1>Selamat Datang di Katalog Shopee</h1>
    <p>Temukan produk terbaik dengan harga terjangkau</p>
    <a href="profilepage.html" class="btn btn-light btn-lg">Lihat Profil Saya</a>
  </section>

  <!-- Produk -->
  <div class="container my-5">
    <h2 class="text-center mb-4">Produk Unggulan</h2>
    <div class="row">
      <div class="col-md-4">
        <div class="card product-card">
          <img src="sandy.jpg" class="card-img-top" alt="Produk 1">
          <div class="card-body">
            <h5 class="card-title">Sandy</h5>
            <p class="card-text">Cutie Sandy</p>
            <a href="#" class="btn btn-primary">Beli</a>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card product-card">
          <img src="spongebob.jpg" class="card-img-top" alt="Produk 2">
          <div class="card-body">
            <h5 class="card-title">Spongebob</h5>
            <p class="card-text">Funny Spongebob</p>
            <a href="#" class="btn btn-primary">Beli</a>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card product-card">
          <img src="tuan krab.jpg" class="card-img-top" alt="Produk 3">
          <div class="card-body">
            <h5 class="card-title">Tuan Krab</h5>
            <p class="card-text">Rich Crab</p>
            <a href="#" class="btn btn-primary">Beli</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
